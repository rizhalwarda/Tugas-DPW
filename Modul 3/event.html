<!DOCTYPE html>
<html lang="en">

<head>
    <title>Halaman Beranda</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Ubah sesuai data Anda -->
    <meta name="author" content="Ranita Rizqi W">
    <meta name="nim" content="253307060">

    <!-- Melengkapi Meta (Blok Bagian Hijau) -->
    <meta name="description" content="Website praktikum HTML5 Lanjut">
    <meta name="keywords" content="HTML5, Form, Audio, Video, SVG, Canvas">

    <!-- Melengkapi Style (Blok Bagian Hijau) -->
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
        }

        /* HEADER */
        header {
            background-color: #666;
            padding: 30px;
            text-align: center;
            font-size: 35px;
            color: white;
        }

        /* NAVIGATION */
        nav {
            float: left;
            width: 30%;
            height: 300px;
            /* hanya untuk demo */
            background: #ccc;
            padding: 20px;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
        }

        nav ul li {
            margin-bottom: 10px;
        }

        nav ul li a {
            text-decoration: none;
            color: black;
            font-weight: bold;
        }

        /* ARTICLE */
        article {
            float: left;
            padding: 20px;
            width: 70%;
            background-color: #f1f1f1;
            height: 660px;
            /* hanya untuk demo */
        }

        /* IMAGE */
        img {
            background-color: chocolate;
            padding: 10px;
            text-align: center;
            color: white;
            width: 300px;
            height: 220px;
            object-fit: cover;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        /* CLEAR FLOAT */
        section::after {
            content: "";
            display: table;
            clear: both;
        }

        /* FOOTER */
        footer {
            background-color: #777;
            padding: 10px;
            text-align: center;
            color: white;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {

            nav,
            article {
                width: 100%;
                height: auto;
            }
        }
    </style>

    <!-- Membuat Mouse Event -->
    <script>
        function zoomIn(img) {
            img.style.transform = "scale(2)";
            img.style.zIndex = "10";
            img.style.position = "relative";
        }

        function zoomOut(img) {
            img.style.transform = "scale(1)";
            img.style.zIndex = "1";
        }
    </script>

</head>

<body>

    <header>
        <h2>Praktikum DPW</h2>
    </header>

    <section>

        <nav>
            <!-- Melengkapi Navigation Link (Blok Bagian Hijau) -->
            <li><a href="index.html">Home</a></li>
            <li><a href="gambar.html">Gambar</a></li>
            <li><a href="event.html">Event</a></li>
            <li><a href="audio.html">Audio</a></li>
            <li><a href="video.html">Video</a></li>
            <li><a href="svg.html">SVG</a></li>
            <li><a href="canvas.html">Canvas</a></li>
            <li><a href="pendaftaran.html">Pendaftaran</a></li>
        </nav>

        <article>
            <h1>Galeri Gambar - Mouse Event</h1>

            <img src="img/event1.jpeg" onmouseover="zoomIn(this)" onmouseout="zoomOut(this)">
            <img src="img/event2.jpeg" onmouseover="zoomIn(this)" onmouseout="zoomOut(this)">
            <img src="img/event3.jpeg" onmouseover="zoomIn(this)" onmouseout="zoomOut(this)">
            <img src="img/event4.jpeg" onmouseover="zoomIn(this)" onmouseout="zoomOut(this)">
            <img src="img/event5.jpeg" onmouseover="zoomIn(this)" onmouseout="zoomOut(this)">
            <img src="img/event6.jpeg" onmouseover="zoomIn(this)" onmouseout="zoomOut(this)">

        </article>
        </article>

    </section>

    <footer>
        <p>&copy; 2026 - Praktikum HTML5 | Ranita Rizqi W</p>
    </footer>

</body>

</html>
