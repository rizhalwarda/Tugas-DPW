<!DOCTYPE html>
<html lang="en">

<head>
    <title>Halaman Beranda</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Ubah sesuai data Anda -->
    <meta name="author" content="Ranita Rizqi W">
    <meta name="nim" content="253307060">

    <!-- Melengkapi Meta (Blok Bagian Hijau) -->
    <meta name="description" content="Website praktikum HTML5 Lanjut">
    <meta name="keywords" content="HTML5, Form, Audio, Video, SVG, Canvas">

    <!-- Melengkapi Style (Blok Bagian Hijau) -->
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
        }

        /* HEADER */
        header {
            background-color: #666;
            padding: 30px;
            text-align: center;
            font-size: 35px;
            color: white;
        }

        /* NAVIGATION */
        nav {
            float: left;
            width: 30%;
            height: 300px;
            /* hanya untuk demo */
            background: #ccc;
            padding: 20px;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
        }

        nav ul li {
            margin-bottom: 10px;
        }

        nav ul li a {
            text-decoration: none;
            color: black;
            font-weight: bold;
        }

        /* ARTICLE */
        article {
            float: left;
            padding: 20px;
            width: 70%;
            background-color: #f1f1f1;
            height: 660px;
            /* hanya untuk demo */
        }

        /* CLEAR FLOAT */
        section::after {
            content: "";
            display: table;
            clear: both;
        }

        /* FOOTER */
        footer {
            background-color: #777;
            padding: 10px;
            text-align: center;
            color: white;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {

            nav,
            article {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>

<body>

    <header>
        <h2>Judul Website</h2>
    </header>

    <section>

        <nav>
            <!-- Melengkapi Navigation Link (Blok Bagian Hijau) -->
            <li><a href="index.html">Home</a></li>
            <li><a href="gambar.html">Gambar</a></li>
            <li><a href="event.html">Event</a></li>
            <li><a href="audio.html">Audio</a></li>
            <li><a href="video.html">Video</a></li>
            <li><a href="svg.html">SVG</a></li>
            <li><a href="canvas.html">Canvas</a></li>
            <li><a href="pendaftaran.html">Pendaftaran</a></li>
        </nav>

        <article>
            <h1>Form Pendaftaran</h1>

            <form>

                <label>No. Telepon:</label><br>
                <input type="tel" pattern="[0-9]{4}-[0-9]{6}" placeholder="085854454953" required><br><br>

                <label>Email:</label><br>
                <input type="email" required><br><br>

                <label>Tanggal Lahir:</label><br>
                <input type="date" min="2007-01-16" max="2007-01-16" required><br><br>

                <label>Tingkat Kepentingan (0-10):</label><br>
                <input type="range" min="0" max="10"><br><br>

                <label>Tanggal Kunjungan:</label><br>
                <input type="date" min="2026-03-03" required><br><br>

                <label>Jam (17.00 - 21.00):</label><br>
                <input type="time" min="17:00" max="21:00" required><br><br>

                <input type="submit" value="Daftar">

            </form>
        </article>

    </section>

    <footer>
        <p>&copy; 2026 - Praktikum HTML5 | Ranita Rizqi W</p>
    </footer>

</body>

</html>
