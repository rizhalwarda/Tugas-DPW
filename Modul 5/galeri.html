<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Flexbox</title>
    <style>
        body {
            background-color: #f0f0f0;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
        }

        .gallery img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            background-color: lightgray; /* biar kelihatan kalau gambar gagal */
        }
    </style>
</head>
<body>
    <div class="gallery">
        <img src="img/1.jpeg" alt="Gambar 1">
        <img src="img/2.jpeg" alt="Gambar 2">
        <img src="img/3.jpeg" alt="Gambar 3">
        <img src="img/4.jpeg" alt="Gambar 4">
        <img src="img/5.jpeg" alt="Gambar 5">
        <img src="img/6.jpeg" alt="Gambar 6">
        <img src="img/7.jpeg" alt="Gambar 7">
        <img src="img/8.jpeg" alt="Gambar 8">
        <img src="img/9.jpeg" alt="Gambar 9">
        <img src="img/10.jpeg" alt="Gambar 10">
        <img src="img/11.jpeg" alt="Gambar 11">
        <img src="img/12.jpeg" alt="Gambar 12">
        <img src="img/13.jpeg" alt="Gambar 13">
        <img src="img/14.jpeg" alt="Gambar 14">
        <img src="img/15.jpeg" alt="Gambar 15">
        <img src="img/16.jpeg" alt="Gambar 16">
        <img src="img/17.jpeg" alt="Gambar 17">
        <img src="img/18.jpeg" alt="Gambar 18">
    </div>
</body>
</html>
